<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapid Viertelstunde — On Air Teaser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_Rg.woff2') format('woff2'), url('fonts/WienerMelange_W_Rg.woff') format('woff');
    font-weight: 400;
  }
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_Bd.woff2') format('woff2'), url('fonts/WienerMelange_W_Bd.woff') format('woff');
    font-weight: 700;
  }
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_ExBd.woff2') format('woff2'), url('fonts/WienerMelange_W_ExBd.woff') format('woff');
    font-weight: 800;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    overflow: hidden;
    font-family: 'WienerMelange', 'Inter', sans-serif;
    color: #fff;
  }

  .canvas {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #0a0a0a;
  }

  /* Green glow background */
  .bg-glow {
    position: absolute;
    width: 120vw; height: 120vh;
    border-radius: 50%;
    background: radial-gradient(ellipse at 50% 50%, rgba(0,166,81,0.08) 0%, transparent 60%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
  }

  /* Rapid green accent bar — top */
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: linear-gradient(90deg, #00a651 0%, #007a3d 50%, #00a651 100%);
    opacity: 0;
  }

  /* Scene container */
  .scene {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }

  /* === SCENE 1: Logo / Show Title === */
  .show-logo {
    font-size: clamp(14px, 1.8vw, 28px);
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    opacity: 0;
  }

  .show-title {
    font-size: clamp(48px, 10vw, 160px);
    font-weight: 800;
    line-height: 0.9;
    text-align: center;
    opacity: 0;
  }

  .show-title .green { color: #00a651; }

  .show-subtitle {
    font-size: clamp(14px, 2vw, 32px);
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-top: clamp(8px, 1vw, 16px);
    opacity: 0;
  }

  /* === SCENE 2: Folge number === */
  .folge-label {
    font-size: clamp(14px, 1.5vw, 24px);
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #00a651;
    opacity: 0;
  }

  .folge-number {
    font-size: clamp(80px, 18vw, 300px);
    font-weight: 800;
    line-height: 1;
    opacity: 0;
    background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* === SCENE 3: Description === */
  .desc-container {
    max-width: 70vw;
    text-align: center;
    opacity: 0;
  }

  .desc-main {
    font-size: clamp(18px, 2.5vw, 40px);
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255,255,255,0.8);
  }

  .desc-highlight {
    color: #00a651;
    font-weight: 700;
  }

  .desc-badge {
    display: inline-block;
    margin-top: clamp(16px, 2vw, 32px);
    padding: clamp(6px, 1vw, 14px) clamp(16px, 2vw, 32px);
    border: 1px solid rgba(0,166,81,0.4);
    border-radius: 100px;
    font-size: clamp(12px, 1.2vw, 20px);
    color: #00a651;
    opacity: 0;
  }

  /* === SCENE 4: Airtime + CTA === */
  .airtime-day {
    font-size: clamp(16px, 2vw, 32px);
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    opacity: 0;
  }

  .airtime-time {
    font-size: clamp(60px, 12vw, 200px);
    font-weight: 800;
    color: #00a651;
    line-height: 1;
    opacity: 0;
  }

  .airtime-channel {
    font-size: clamp(16px, 2vw, 32px);
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-top: clamp(8px, 1vw, 16px);
    opacity: 0;
  }

  .airtime-url {
    font-family: 'Inter', sans-serif;
    font-size: clamp(11px, 1.2vw, 20px);
    color: rgba(255,255,255,0.3);
    margin-top: clamp(12px, 1.5vw, 24px);
    opacity: 0;
  }

  /* Green corner accent */
  .corner-accent {
    position: absolute;
    bottom: 0; right: 0;
    width: clamp(120px, 15vw, 250px);
    height: clamp(120px, 15vw, 250px);
    opacity: 0;
    pointer-events: none;
  }

  .corner-accent::before {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 100%; height: 100%;
    background: linear-gradient(315deg, rgba(0,166,81,0.15) 0%, transparent 60%);
  }

  /* Progress bar */
  .progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: #00a651;
    width: 0%;
    z-index: 100;
    opacity: 0;
  }

  /* Scanline overlay */
  .scanlines {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.02) 2px,
      rgba(0,0,0,0.02) 4px
    );
    pointer-events: none;
    z-index: 50;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="scanlines"></div>
  <div class="bg-glow"></div>
  <div class="top-bar"></div>
  <div class="corner-accent"></div>

  <!-- SCENE 1: Show Title (0 - 8s) -->
  <div class="scene" id="scene1">
    <div class="show-logo">W24 präsentiert</div>
    <div class="show-title">
      <span class="green">RAPID</span><br>
      VIERTELSTUNDE
    </div>
    <div class="show-subtitle">Der wöchentliche Blick hinter die Kulissen des SK Rapid</div>
  </div>

  <!-- SCENE 2: Folge Number (8 - 14s) -->
  <div class="scene" id="scene2">
    <div class="folge-label">Neue Folge</div>
    <div class="folge-number">393</div>
  </div>

  <!-- SCENE 3: What's in it (14 - 22s) -->
  <div class="scene" id="scene3">
    <div class="desc-container">
      <div class="desc-main">
        Aktuelle <span class="desc-highlight">News</span>, Hintergrundinformationen<br>
        und Geschichten rund um den<br>
        <span class="desc-highlight">Rekordmeister</span> und seine Fans.
      </div>
      <div class="desc-badge">300+ Folgen — Jede Woche neu</div>
    </div>
  </div>

  <!-- SCENE 4: Airtime + CTA (22 - 30s) -->
  <div class="scene" id="scene4">
    <div class="airtime-day">Freitag</div>
    <div class="airtime-time">19:15</div>
    <div class="airtime-channel">W24 WIEN TV</div>
    <div class="airtime-url">w24.at/Rapid-Viertelstunde</div>
  </div>

  <div class="progress" id="progress"></div>
</div>

<script>
(function() {
  const TOTAL = 30;
  let tl;

  function build() {
    if (tl) tl.kill();
    tl = gsap.timeline({ paused: true, repeat: -1, repeatDelay: 3 });

    // Ambient
    tl.to('.bg-glow', { opacity: 1, duration: 2 }, 0);
    tl.to('.top-bar', { opacity: 1, duration: 0.6 }, 0);
    tl.to('.corner-accent', { opacity: 1, duration: 1 }, 0);
    tl.to('#progress', { opacity: 1, duration: 0.3 }, 0);
    tl.to('#progress', { width: '100%', duration: TOTAL, ease: 'none' }, 0);

    // ==============================
    // SCENE 1: Title (0s - 8s)
    // ==============================
    tl.set('#scene1', { opacity: 1 }, 0)
      .fromTo('.show-logo', { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: 'power2.out' }, 0.5)
      .fromTo('.show-title', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 1, ease: 'power3.out' }, 1)
      .fromTo('.show-subtitle', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6 }, 2.2)
      // Hold
      // Exit
      .to('#scene1', { opacity: 0, duration: 0.8, ease: 'power2.in' }, 7);

    // ==============================
    // SCENE 2: Folge Number (8s - 14s)
    // ==============================
    tl.set('#scene2', { opacity: 1 }, 8)
      .fromTo('.folge-label', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }, 8.3)
      .fromTo('.folge-number', { scale: 1.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.8, ease: 'power3.out' }, 8.6)
      // Hold
      // Exit
      .to('#scene2', { opacity: 0, duration: 0.6 }, 13);

    // ==============================
    // SCENE 3: Description (14s - 22s)
    // ==============================
    tl.set('#scene3', { opacity: 1 }, 14)
      .fromTo('.desc-container', { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'power2.out' }, 14.3)
      .fromTo('.desc-main', { opacity: 0 }, { opacity: 1, duration: 0.5 }, 14.5)
      .fromTo('.desc-badge', { scale: 0.9, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: 'back.out(1.5)' }, 15.5)
      // Hold
      // Exit
      .to('#scene3', { opacity: 0, duration: 0.6 }, 21);

    // ==============================
    // SCENE 4: Airtime (22s - 30s)
    // ==============================
    tl.set('#scene4', { opacity: 1 }, 22)
      .fromTo('.airtime-day', { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: 'power2.out' }, 22.3)
      .fromTo('.airtime-time', { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7, ease: 'power3.out' }, 22.6)
      .fromTo('.airtime-channel', { y: 15, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5 }, 23.5)
      .fromTo('.airtime-url', { opacity: 0 }, { opacity: 1, duration: 0.5 }, 24)
      // Hold until end
      .to('#scene4', { opacity: 0, duration: 1 }, 29);

    // Reset
    tl.set('#progress', { width: '0%' }, TOTAL);

    window.__timelines = [tl];
    window.__duration = TOTAL;
    return tl;
  }

  build();
  tl.play();

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });
})();
</script>
</body>
</html>
