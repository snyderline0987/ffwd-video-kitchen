<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFWD Rapid Insert</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_Rg.woff2') format('woff2'), url('fonts/WienerMelange_W_Rg.woff') format('woff');
    font-weight: 400;
  }
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_ExBd.woff2') format('woff2'), url('fonts/WienerMelange_W_ExBd.woff') format('woff');
    font-weight: 800;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; font-family: 'WienerMelange', sans-serif; }

  .canvas {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }

  .trans-grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
      linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* Full-screen fill video (the bar animation) */
  #fill-video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

  /* Text overlay — positioned inside the bar */
  #text-overlay {
    position: absolute;
    top: 81.3%;   /* 878/1080 */
    left: 21%;    /* 404/1920 */
    height: 11.9%; /* 128/1080 */
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    opacity: 0;
    padding-left: 1.5%;
    padding-bottom: 50px;
  }

  #ri-name {
    color: #fff;
    font-size: clamp(19px, 3.2vw, 58px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: 0.3px;
  }

  #ri-role {
    color: rgba(255,255,255,0.9);
    font-size: clamp(11px, 1.8vw, 29px);
    font-weight: 400;
    line-height: 1.2;
    margin-top: 2px;
  }

  .ri-config {
    position: fixed; top: 20px; right: 20px;
    background: rgba(0,0,0,0.92); border: 1px solid #333;
    border-radius: 12px; padding: 24px;
    pointer-events: all; display: none;
    color: #fff; font-size: 14px;
    backdrop-filter: blur(12px); z-index: 100;
    font-family: 'Inter', sans-serif;
  }
  .ri-config.show { display: block; }
  .ri-config h3 { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
  .ri-config label { display: block; margin-bottom: 4px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .ri-config input {
    background: #1a1a1a; border: 1px solid #333; color: #fff;
    padding: 8px 12px; border-radius: 6px; width: 280px; margin-bottom: 14px;
    font-family: 'Inter', sans-serif; font-size: 14px;
  }
  .ri-config input:focus { outline: none; border-color: #00a651; }
  .ri-config button {
    background: #00a651; color: #fff; border: none; padding: 10px 24px;
    border-radius: 6px; cursor: pointer; font-weight: 700; margin-right: 8px;
  }
  .ri-config button.secondary { background: #333; }

  .loop-badge {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    pointer-events: none; z-index: 50;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="trans-grid"></div>
  <video id="fill-video" src="media/rapid-fill.webm" autoplay loop muted playsinline></video>
  <div id="text-overlay">
    <div id="ri-name">Steffen Hofmann</div>
    <div id="ri-role">Mittelfeldspieler</div>
  </div>
</div>

<div class="loop-badge">↻ LOOP</div>

<div class="ri-config" id="ri-config">
  <h3>⚽ Rapid Insert</h3>
  <label>Name</label>
  <input id="cfg-name" value="Steffen Hofmann" />
  <label>Position / Rolle</label>
  <input id="cfg-role" value="Mittelfeldspieler" />
  <button onclick="applyConfig()">Anwenden</button>
  <button class="secondary" onclick="replayAnimation()">▶ Replay</button> <button class="secondary" onclick="document.getElementById('ri-config').classList.remove('show')">✕ Close</button>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('name')) { document.getElementById('ri-name').textContent = params.get('name'); document.getElementById('cfg-name').value = params.get('name'); }
  if (params.get('role')) { document.getElementById('ri-role').textContent = params.get('role'); document.getElementById('cfg-role').value = params.get('role'); }

  const video = document.getElementById('fill-video');
  const overlay = document.getElementById('text-overlay');
  let tl;

  function buildTimeline() {
    if (tl) { tl.kill(); }
    tl = gsap.timeline({ paused: true, repeat: -1, repeatDelay: 1 });

    gsap.set('#text-overlay', { opacity: 0 });

    // Text fades in as bar appears (~0.4s in)
    tl.to('#text-overlay', { opacity: 1, duration: 0.4, ease: 'power2.out' }, 0.4)
    // Text fades out before bar exits (~4.2s)
      .to('#text-overlay', { opacity: 0, duration: 0.3, ease: 'power2.in' }, 4.2);

    window.__timelines = [tl];
    window.__duration = 6;
    return tl;
  }

  // Wait for video to be ready, then sync
  video.addEventListener('playing', function() {
    buildTimeline();
    tl.play();
  });

  // Fallback if already playing
  if (!video.paused) {
    buildTimeline();
    tl.play();
  }

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    if (tl) { tl.time(t); tl.pause(); }
    video.currentTime = t;
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'e' || e.key === 'E') {
      document.getElementById('ri-config').classList.add('show');
    }
  });

  window.applyConfig = function() {
    document.getElementById('ri-name').textContent = document.getElementById('cfg-name').value;
    document.getElementById('ri-role').textContent = document.getElementById('cfg-role').value;
  };

  window.replayAnimation = function() {
    video.currentTime = 0;
    gsap.set('#text-overlay', { opacity: 0 });
    buildTimeline();
    tl.play();
  };
})();
</script>
</body>
</html>
