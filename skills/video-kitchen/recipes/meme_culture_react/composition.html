<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<title>Meme Culture React — FFWD Video Kitchen</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; width: 1080px; height: 1920px; font-family: 'Inter', sans-serif; }
  .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; opacity: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
  .impact { font-family: 'Impact', 'Arial Black', sans-serif; text-transform: uppercase; -webkit-text-stroke: 3px #000; text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; }
  .zoom-ring { position: absolute; border: 4px solid #e50914; border-radius: 50%; pointer-events: none; }
</style>
</head>
<body>

<!-- Scene 1: Trigger — What They Showed Me (0-3s) -->
<div class="scene" id="scene-trigger" style="background:#0a0a0a;">
  <div id="trigger-content" style="text-align:center; opacity:0;">
    <div style="font-size:100px;">👀</div>
    <div class="impact text-6xl text-white mt-6" style="line-height:1.1;">
      when they<br>told me
    </div>
  </div>
</div>

<!-- Scene 2: Build — Zoom Reaction (3-6s) -->
<div class="scene" id="scene-react" style="background:#0a0a0a;">
  <div id="react-zoom" style="position:relative; opacity:0;">
    <div style="width:400px; height:400px; border-radius:50%; background:radial-gradient(circle, #2a1a1a, #0a0a0a); display:flex; align-items:center; justify-content:center;">
      <span style="font-size:150px;">😱</span>
    </div>
    <div id="zoom-ring1" class="zoom-ring" style="width:420px; height:420px; top:-10px; left:-10px; opacity:0;"></div>
    <div id="zoom-ring2" class="zoom-ring" style="width:500px; height:500px; top:-50px; left:-50px; opacity:0;"></div>
  </div>
  <div id="react-text" class="impact text-5xl text-white mt-8" style="opacity:0;">
    BRO WAIT
  </div>
</div>

<!-- Scene 3: Escalation — Bold Text (6-10s) -->
<div class="scene" id="scene-escalate" style="background: #e50914;">
  <div id="escalate-content" style="text-align:center; opacity:0;">
    <div class="impact text-8xl text-white" style="line-height:1;">
      NO<br>WAY
    </div>
    <div style="font-size:60px; margin-top:30px;">💀💀💀</div>
  </div>
</div>

<!-- Scene 4: Punchline — Meme Text (10-15s) -->
<div class="scene" id="scene-punch" style="background:#0a0a0a;">
  <div id="punch-content" style="text-align:center; opacity:0;">
    <div class="impact text-5xl text-white" style="line-height:1.2;">
      me explaining<br>why this is<br>
      <span style="color:#e50914;">THE GREATEST<br>THING EVER</span>
    </div>
    <div style="font-size:80px; margin-top:40px;">🤷‍♂️</div>
    <div class="text-lg font-bold tracking-widest mt-8" style="color:rgba(255,255,255,0.3);">FFWD</div>
  </div>
</div>

<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  // Scene 1: Trigger (0-3s)
  tl.fromTo('#scene-trigger', { opacity: 0 }, { opacity: 1, duration: 0.15 }, 0)
    .fromTo('#trigger-content', { scale: 0.6, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: 'back.out(3)' }, 0.15)
    .to('#scene-trigger', { opacity: 0, duration: 0.15 }, 2.85);

  // Scene 2: React Zoom (3-6s)
  tl.fromTo('#scene-react', { opacity: 0 }, { opacity: 1, duration: 0.1 }, 3.0)
    .fromTo('#react-zoom', { scale: 0.3, opacity: 0 }, { scale: 1.2, opacity: 1, duration: 0.6, ease: 'back.out(2)' }, 3.1)
    .to('#react-zoom', { scale: 1, duration: 0.3, ease: 'power2.out' }, 3.7)
    .fromTo('#zoom-ring1', { opacity: 0, scale: 0.5 }, { opacity: 0.6, scale: 1, duration: 0.4, ease: 'power2.out' }, 3.5)
    .fromTo('#zoom-ring2', { opacity: 0, scale: 0.5 }, { opacity: 0.3, scale: 1, duration: 0.5, ease: 'power2.out' }, 3.7)
    .fromTo('#react-text', { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.35, ease: 'back.out(3)' }, 4.2)
    .to('#scene-react', { opacity: 0, duration: 0.1 }, 5.9);

  // Scene 3: Escalate (6-10s) — red flash
  tl.fromTo('#scene-escalate', { opacity: 0, scale: 1.2 }, { opacity: 1, scale: 1, duration: 0.2, ease: 'power2.out' }, 6.0)
    .fromTo('#escalate-content', { scale: 2, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(4)' }, 6.1)
    .to('#scene-escalate', { opacity: 0, duration: 0.15 }, 9.85);

  // Scene 4: Punchline (10-15s)
  tl.fromTo('#scene-punch', { opacity: 0 }, { opacity: 1, duration: 0.15 }, 10.0)
    .fromTo('#punch-content', { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: 'power3.out' }, 10.15);

  window.__timelines = [tl];
  window.__duration = 15;

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });
})();
</script>
</body>
</html>
