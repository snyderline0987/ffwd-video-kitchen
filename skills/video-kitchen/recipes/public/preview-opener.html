<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            background: #111; margin: 0; overflow: hidden; 
            width: 1920px; height: 1080px; 
        }
        .checker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
              linear-gradient(45deg, #222 25%, transparent 25%), 
              linear-gradient(-45deg, #222 25%, transparent 25%), 
              linear-gradient(45deg, transparent 75%, #222 75%), 
              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="checker"></div>
    <div id="insert-container"></div>
    
    <script>
        fetch('raw-opener.html').then(r => r.text()).then(html => {
            const container = document.getElementById('insert-container');
            container.innerHTML = html;
            
            // Auto-play the video and loop it for preview purposes
            const video = container.querySelector('video');
            if (video) {
                video.autoplay = true;
                video.loop = true;
                video.play().catch(e => console.log('Autoplay blocked', e));
            }
        });
    </script>
</body>
</html>
