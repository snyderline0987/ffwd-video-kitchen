<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>FFWD Lower Third — Motion Template</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; width: 1920px; height: 1080px; font-family: 'Inter', sans-serif; }
  .lt-wrap { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; pointer-events: none; }
  .lt-element { position: absolute; }
  /* Red name bar */
  #name-bar { left: 120px; top: 780px; width: 700px; height: 80px; background: #e50914; clip-path: polygon(0 0, 100% 0, 96% 100%, 0% 100%); opacity: 0; }
  /* Name text */
  #name-text { left: 155px; top: 793px; color: #fff; font-size: 42px; font-weight: 800; letter-spacing: 1px; opacity: 0; white-space: nowrap; }
  /* Title/dark bar */
  #title-bar { left: 120px; top: 860px; width: 520px; height: 55px; background: rgba(17,17,17,0.92); clip-path: polygon(0 0, 100% 0, 96% 100%, 0% 100%); opacity: 0; }
  /* Title text */
  #title-text { left: 155px; top: 872px; color: rgba(255,255,255,0.7); font-size: 22px; font-weight: 400; opacity: 0; white-space: nowrap; }
  /* Accent line */
  #accent-line { left: 120px; top: 775px; width: 0; height: 5px; background: #e50914; opacity: 0; }
</style>
</head>
<body>

<div class="lt-wrap">
  <div class="lt-element" id="accent-line"></div>
  <div class="lt-element" id="name-bar"></div>
  <div class="lt-element" id="name-text">DANIEL SCHNEIDER</div>
  <div class="lt-element" id="title-bar"></div>
  <div class="lt-element" id="title-text">Head of Video Kitchen</div>
</div>

<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  // Animate IN (0.5-2s): slide from left with skew
  tl.fromTo('#name-bar', { x: -800, opacity: 0, skewX: 15 }, { x: 0, opacity: 1, skewX: 0, duration: 0.6, ease: 'power4.out' }, 0.5)
    .fromTo('#name-text', { x: -800, opacity: 0, skewX: 15 }, { x: 0, opacity: 1, skewX: 0, duration: 0.6, ease: 'power4.out' }, 0.6)
    .fromTo('#title-bar', { x: -800, opacity: 0, skewX: 15 }, { x: 0, opacity: 1, skewX: 0, duration: 0.6, ease: 'power4.out' }, 0.7)
    .fromTo('#title-text', { x: -800, opacity: 0, skewX: 15 }, { x: 0, opacity: 1, skewX: 0, duration: 0.6, ease: 'power4.out' }, 0.8)
    .fromTo('#accent-line', { width: 0, opacity: 0 }, { width: 700, opacity: 1, duration: 0.5, ease: 'power3.out' }, 0.5);

  // Hold (2-4s): static display

  // Animate OUT (4-5s): slide back left with reverse skew
  tl.to('#accent-line', { width: 0, opacity: 0, duration: 0.4, ease: 'power3.in' }, 4.0)
    .to('#name-text', { x: -800, opacity: 0, skewX: -15, duration: 0.4, ease: 'power3.in' }, 4.05)
    .to('#name-bar', { x: -800, opacity: 0, skewX: -15, duration: 0.4, ease: 'power3.in' }, 4.1)
    .to('#title-text', { x: -800, opacity: 0, skewX: -15, duration: 0.4, ease: 'power3.in' }, 4.12)
    .to('#title-bar', { x: -800, opacity: 0, skewX: -15, duration: 0.4, ease: 'power3.in' }, 4.15);

  window.__timelines = [tl];
  window.__duration = 5;

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });
})();
</script>
</body>
</html>
