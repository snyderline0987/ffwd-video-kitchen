<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadt Wien 9:16 Insert</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_Rg.woff2') format('woff2'),
         url('fonts/WienerMelange_W_Rg.woff') format('woff');
    font-weight: 400;
  }
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_Bd.woff2') format('woff2'),
         url('fonts/WienerMelange_W_Bd.woff') format('woff');
    font-weight: 700;
  }
  @font-face {
    font-family: 'WienerMelange';
    src: url('fonts/WienerMelange_W_ExBd.woff2') format('woff2'),
         url('fonts/WienerMelange_W_ExBd.woff') format('woff');
    font-weight: 800;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    overflow: hidden;
    font-family: 'WienerMelange', sans-serif;
  }

  /* Dashboard preview mode — dark bg, bar centered */
  body.preview-mode {
    background: #1a1a1a;
  }
  body.preview-mode .trans-grid { display: none; }
  body.preview-mode .content {
    align-items: center;
    justify-content: center;
  }
  body.preview-mode #bb-bar {
    margin-top: 0;
  }

  .canvas {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .trans-grid {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
      linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    opacity: 0.4;
    pointer-events: none;
  }

  .content {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }

  #bb-bar {
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    background: #FF5A64;
    opacity: 0;
    padding: 28px 50px 28px 45px;
    margin-top: 42%;
    white-space: nowrap;
    overflow: hidden;
  }

  #bb-name {
    color: #fff;
    font-size: clamp(28px, 4.5vw, 80px);
    font-weight: 800;
    letter-spacing: 0.5px;
    line-height: 1.15;
  }

  #bb-role {
    color: #fff;
    font-size: clamp(28px, 4.5vw, 80px);
    font-weight: 400;
    letter-spacing: 0.3px;
    line-height: 1.15;
    margin-top: 4px;
  }

  /* Config panel */
  .bb-config {
    position: fixed; top: 20px; right: 20px;
    background: rgba(0,0,0,0.92); border: 1px solid #333;
    border-radius: 12px; padding: 24px;
    pointer-events: all; display: none;
    color: #fff; font-size: 14px;
    backdrop-filter: blur(12px); z-index: 100;
    font-family: 'Inter', sans-serif;
    max-height: 90vh;
    overflow-y: auto;
  }
  .bb-config.show { display: block; }
  .bb-config h3 { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
  .bb-config label { display: block; margin-bottom: 4px; color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .bb-config input[type="text"],
  .bb-config input[type="number"] {
    background: #1a1a1a; border: 1px solid #333; color: #fff;
    padding: 8px 12px; border-radius: 6px; width: 280px; margin-bottom: 14px;
    font-family: 'Inter', sans-serif; font-size: 14px;
  }
  .bb-config input:focus { outline: none; border-color: #FF5A64; }
  .bb-config button {
    background: #FF5A64; color: #fff; border: none; padding: 10px 24px;
    border-radius: 6px; cursor: pointer; font-weight: 700; margin-right: 8px;
  }
  .bb-config button.secondary { background: #333; }

  /* Color picker swatches */
  .color-swatches {
    display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .color-swatch {
    width: 40px; height: 40px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: #fff; transform: scale(1.1); }

  .loop-badge {
    position: fixed; bottom: 16px; left: 16px;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 6px 14px; border-radius: 20px;
    font-size: 12px; font-family: 'Inter', sans-serif;
    pointer-events: none; z-index: 50;
    font-weight: 600; letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="canvas">
  <div class="trans-grid"></div>
  <div class="content">
    <div id="bb-bar">
      <div id="bb-name">Vorname Name</div>
      <div id="bb-role">Position</div>
    </div>
  </div>
</div>

<div class="loop-badge">↻ LOOP</div>

<!-- Config — press 'E' -->
<div class="bb-config" id="bb-config">
  <h3>⚙️ Stadt Wien Insert</h3>
  <label>Name</label>
  <input id="cfg-name" value="Vorname Name" />
  <label>Position / Rolle</label>
  <input id="cfg-role" value="Position" />

  <label>Farbe</label>
  <div class="color-swatches" id="color-swatches">
    <div class="color-swatch active" data-color="#FF5A64" style="background:#FF5A64" title="Korallrot #FF5A64"></div>
    <div class="color-swatch" data-color="#AAAAFA" style="background:#AAAAFA" title="Lavendel #AAAAFA"></div>
    <div class="color-swatch" data-color="#462346" style="background:#462346" title="Dunkelviolett #462346"></div>
    <div class="color-swatch" data-color="#82D282" style="background:#82D282" title="Hellgrün #82D282"></div>
    <div class="color-swatch" data-color="#E6C828" style="background:#E6C828" title="Gelb #E6C828"></div>
    <div class="color-swatch" data-color="#D6D1CA" style="background:#D6D1CA" title="Beige #D6D1CA"></div>
  </div>
  <input id="cfg-color" value="#FF5A64" />

  <label>Dauer (Sekunden)</label>
  <input id="cfg-duration" type="number" value="5" min="2" max="20" />
  <button onclick="applyConfig()">Anwenden</button>
  <button class="secondary" onclick="replayAnimation()">▶ Replay</button>
</div>

<script>
(function() {
  // Stadt Wien palette
  var palette = ['#FF5A64','#AAAAFA','#462346','#82D282','#E6C828','#D6D1CA'];
  var selectedColor = '#FF5A64';

  // Swatch click handler
  document.querySelectorAll('.color-swatch').forEach(function(sw) {
    sw.addEventListener('click', function() {
      document.querySelectorAll('.color-swatch').forEach(function(s) { s.classList.remove('active'); });
      sw.classList.add('active');
      selectedColor = sw.getAttribute('data-color');
      document.getElementById('cfg-color').value = selectedColor;
      // Apply color immediately
      bar.style.background = selectedColor;
    });
  });

  var params = new URLSearchParams(window.location.search);
  var isPreview = params.get('preview') === '1' || params.has('preview');
  if (isPreview) { document.body.classList.add('preview-mode'); }
  if (params.get('name')) { document.getElementById('bb-name').textContent = params.get('name'); document.getElementById('cfg-name').value = params.get('name'); }
  if (params.get('role')) { document.getElementById('bb-role').textContent = params.get('role'); document.getElementById('cfg-role').value = params.get('role'); }
  if (params.get('color')) {
    selectedColor = params.get('color');
    document.getElementById('bb-bar').style.background = selectedColor;
    document.getElementById('cfg-color').value = selectedColor;
    // Highlight matching swatch
    document.querySelectorAll('.color-swatch').forEach(function(s) {
      s.classList.toggle('active', s.getAttribute('data-color') === selectedColor);
    });
  }

  var totalDuration = parseFloat(params.get('duration')) || 5;
  var tl;
  var bar = document.getElementById('bb-bar');

  function measureBarWidth() {
    var orig = bar.style.cssText;
    bar.style.cssText = 'display:inline-flex;flex-direction:column;justify-content:center;padding:28px 50px 28px 45px;opacity:1;white-space:nowrap;width:auto;position:static;background:' + (bar.style.background || selectedColor);
    var w = bar.scrollWidth;
    bar.style.cssText = orig;
    return w;
  }

  function buildTimeline() {
    if (tl) { tl.kill(); }
    tl = gsap.timeline({ paused: true, repeat: -1, repeatDelay: 1 });

    var targetWidth = measureBarWidth();
    var outStart = totalDuration - 0.8;

    gsap.set('#bb-bar', { width: 0, opacity: 1, overflow: 'hidden' });
    gsap.set('#bb-name', { opacity: 0 });
    gsap.set('#bb-role', { opacity: 0 });

    // IN: crop open left → right
    tl.to('#bb-bar', {
      width: targetWidth,
      duration: 0.5,
      ease: 'power2.out'
    }, 0.3)
    .to('#bb-name', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.45)
    .to('#bb-role', { opacity: 1, duration: 0.3, ease: 'power2.out' }, 0.6);

    // OUT: crop closed right → left
    tl.to('#bb-role', { opacity: 0, duration: 0.15 }, outStart)
    .to('#bb-name', { opacity: 0, duration: 0.15 }, outStart + 0.04)
    .to('#bb-bar', {
      width: 0,
      duration: 0.45,
      ease: 'power3.in'
    }, outStart + 0.08);

    window.__timelines = [tl];
    window.__duration = totalDuration;
    return tl;
  }

  buildTimeline();
  tl.play();

  // Hyperframes seek
  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'e' || e.key === 'E') {
      document.getElementById('bb-config').classList.toggle('show');
    }
  });

  window.applyConfig = function() {
    document.getElementById('bb-name').textContent = document.getElementById('cfg-name').value;
    document.getElementById('bb-role').textContent = document.getElementById('cfg-role').value;
    selectedColor = document.getElementById('cfg-color').value;
    bar.style.background = selectedColor;
    totalDuration = parseFloat(document.getElementById('cfg-duration').value) || 5;

    gsap.set(['#bb-bar','#bb-name','#bb-role'], { clearProps: 'all' });
    buildTimeline();
    tl.play();
  };

  window.replayAnimation = function() {
    gsap.set(['#bb-bar','#bb-name','#bb-role'], { clearProps: 'all' });
    buildTimeline();
    tl.play();
  };
})();
</script>
</body>
</html>
