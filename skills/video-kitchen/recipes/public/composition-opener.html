<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>FFWD Opener — Motion Template</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: transparent; overflow: hidden; width: 1920px; height: 1080px; font-family: 'Inter', sans-serif; }
  .opener-wrap { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: flex; align-items: center; justify-content: center; }
  .ffwd-text { font-weight: 900; font-size: 220px; letter-spacing: -8px; color: #e50914; position: relative; }
  .ffwd-letter { display: inline-block; position: relative; }
  .strike-line { position: absolute; height: 6px; background: #e50914; border-radius: 3px; }
  #strike-left { left: -200px; top: 50%; width: 0; }
  #strike-right { right: -200px; top: 50%; width: 0; }
  .dot { position: absolute; width: 12px; height: 12px; background: #e50914; border-radius: 50%; opacity: 0; }
  .subtitle { position: absolute; bottom: 380px; left: 50%; transform: translateX(-50%); font-size: 16px; letter-spacing: 8px; color: rgba(255,255,255,0.5); font-weight: 700; text-transform: uppercase; opacity: 0; }
  .corner-accent { position: absolute; width: 60px; height: 60px; border-color: rgba(229,9,20,0.4); border-style: solid; }
  #corner-tl { top: 60px; left: 60px; border-width: 3px 0 0 3px; opacity: 0; }
  #corner-tr { top: 60px; right: 60px; border-width: 3px 3px 0 0; opacity: 0; }
  #corner-bl { bottom: 60px; left: 60px; border-width: 0 0 3px 3px; opacity: 0; }
  #corner-br { bottom: 60px; right: 60px; border-width: 0 3px 3px 0; opacity: 0; }
</style>
</head>
<body>

<div class="opener-wrap">
  <div id="corner-tl" class="corner-accent"></div>
  <div id="corner-tr" class="corner-accent"></div>
  <div id="corner-bl" class="corner-accent"></div>
  <div id="corner-br" class="corner-accent"></div>

  <div class="ffwd-text" id="ffwd-text">
    <span class="ffwd-letter" id="letter-f" style="opacity:0;">F</span><span class="ffwd-letter" id="letter-f2" style="opacity:0;">F</span><span class="ffwd-letter" id="letter-w" style="opacity:0;">W</span><span class="ffwd-letter" id="letter-d" style="opacity:0;">D</span>
    <div class="strike-line" id="strike-left"></div>
    <div class="strike-line" id="strike-right"></div>
  </div>

  <div class="dot" id="dot1" style="top: 400px; left: 500px;"></div>
  <div class="dot" id="dot2" style="top: 650px; right: 500px;"></div>
  <div class="dot" id="dot3" style="bottom: 350px; left: 700px;"></div>
  <div class="dot" id="dot4" style="top: 300px; right: 600px;"></div>

  <div class="subtitle" id="subtitle">VIDEO KITCHEN</div>
</div>

<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  // Corners fade in (0-0.5s)
  tl.fromTo('#corner-tl', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0)
    .fromTo('#corner-tr', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.1)
    .fromTo('#corner-bl', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.15)
    .fromTo('#corner-br', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 0.2);

  // Letters fly in from below with stagger (0.3-1.5s)
  tl.fromTo('#letter-f', { y: 200, opacity: 0, rotation: -15 }, { y: 0, opacity: 1, rotation: 0, duration: 0.5, ease: 'back.out(3)' }, 0.3)
    .fromTo('#letter-f2', { y: 250, opacity: 0, rotation: 10 }, { y: 0, opacity: 1, rotation: 0, duration: 0.5, ease: 'back.out(3)' }, 0.45)
    .fromTo('#letter-w', { y: 300, opacity: 0, rotation: -8 }, { y: 0, opacity: 1, rotation: 0, duration: 0.5, ease: 'back.out(3)' }, 0.6)
    .fromTo('#letter-d', { y: 280, opacity: 0, rotation: 12 }, { y: 0, opacity: 1, rotation: 0, duration: 0.5, ease: 'back.out(3)' }, 0.75);

  // Strike lines extend (1.2-2s)
  tl.to('#strike-left', { width: 180, duration: 0.5, ease: 'power3.out' }, 1.2)
    .to('#strike-right', { width: 180, duration: 0.5, ease: 'power3.out' }, 1.3);

  // Dots pop in (1.5-2s)
  tl.fromTo('#dot1', { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.6, duration: 0.3, ease: 'back.out(4)' }, 1.5)
    .fromTo('#dot2', { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.6, duration: 0.3, ease: 'back.out(4)' }, 1.6)
    .fromTo('#dot3', { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.6, duration: 0.3, ease: 'back.out(4)' }, 1.7)
    .fromTo('#dot4', { scale: 0, opacity: 0 }, { scale: 1, opacity: 0.6, duration: 0.3, ease: 'back.out(4)' }, 1.8);

  // Subtitle fade in (2-2.5s)
  tl.fromTo('#subtitle', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 2.0);

  // Hold (2.5-4s) — subtle pulse on letters
  tl.to('#ffwd-text', { scale: 1.02, duration: 0.4, ease: 'power1.inOut', yoyo: true, repeat: 1 }, 2.8);

  // Everything fades out (4-5s)
  tl.to('.ffwd-letter', { y: -100, opacity: 0, duration: 0.4, stagger: 0.05, ease: 'power3.in' }, 4.0)
    .to('#strike-left', { width: 0, duration: 0.3, ease: 'power2.in' }, 4.0)
    .to('#strike-right', { width: 0, duration: 0.3, ease: 'power2.in' }, 4.05)
    .to('#subtitle', { opacity: 0, duration: 0.3 }, 4.1)
    .to('.dot', { scale: 0, opacity: 0, duration: 0.3, stagger: 0.03 }, 4.0)
    .to('.corner-accent', { opacity: 0, duration: 0.3 }, 4.2);

  window.__timelines = [tl];
  window.__duration = 5;

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });
})();
</script>
</body>
</html>
