<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
        body { 
            background: #111; margin: 0; overflow: hidden; 
            width: 1920px; height: 1080px; 
            /* Scale it down to fit in the dashboard card */
            transform: scale(0.25); transform-origin: top left; 
        }
        /* Checkerboard to show transparency */
        .checker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
              linear-gradient(45deg, #222 25%, transparent 25%), 
              linear-gradient(-45deg, #222 25%, transparent 25%), 
              linear-gradient(45deg, transparent 75%, #222 75%), 
              linear-gradient(-45deg, transparent 75%, #222 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            z-index: -1;
        }
        .od-layer { position: absolute; }
    </style>
</head>
<body>
    <div class="checker"></div>
    <div id="insert-container"></div>
    
    <script>
        // Fetch and inject the raw HTML compiled from Open Design
        fetch('raw-lower-third.html').then(r => r.text()).then(html => {
            const container = document.getElementById('insert-container');
            container.innerHTML = html;
            
            // Re-evaluate the GSAP script inside the fetched HTML
            const scripts = container.querySelectorAll('script');
            scripts.forEach(s => {
                const newScript = document.createElement('script');
                newScript.textContent = s.textContent;
                // Add a loop so it keeps repeating in the dashboard
                newScript.textContent += "\nltTimeline.repeat(-1).repeatDelay(2);";
                document.body.appendChild(newScript);
            });
        });
    </script>
</body>
</html>
