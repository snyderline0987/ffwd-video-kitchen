<!--
  News Overview 30s — HyperFrames Composition Template
  Produces a ~30s news clip from B-Roll footage with VO, lower third, and ticker.

  WHAT THIS PRODUCES:
  - Sequential B-Roll clips with crossfade transitions
  - VO narration (audio lane)
  - Lower-third headline overlay (slide in/out)
  - Scrolling news ticker bar

  RULES:
  - All clips go on data-track-index="0", stacked with crossfade GSAP tweens
  - Audio (VO) on data-track-index="1"
  - Lower third / overlays on data-track-index="2"
  - Each clip needs: id, data-start, data-duration, data-track-index, muted, playsinline
  - GSAP timeline: from() for entrance, to() for exit/fadeout, crossfade overlaps by 0.2s
  - Register timeline on window.__timelines["<composition-id>"]
  - Re-encode source clips with dense keyframes before use:
    ffmpeg -i input.mp4 -c:v libx264 -r 30 -g 30 -keyint_min 30 -movflags +faststart -c:a copy output.mp4
-->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }

[data-composition-id="news-overview-30s"] {
  position: relative;
  width: 1280px;
  height: 720px;
  overflow: hidden;
  background: #000;
}

/* B-Roll clips stacked, full canvas */
.clip-video {
  position: absolute;
  top: 0; left: 0;
  width: 1280px;
  height: 720px;
  object-fit: cover;
}

/* Lower third bar */
#lower-third {
  position: absolute;
  bottom: 60px; left: 0;
  width: 100%; height: 80px;
  display: flex;
  align-items: center;
  padding-left: 40px;
  background: linear-gradient(90deg, rgba(0,50,120,0.9) 0%, rgba(0,50,120,0) 100%);
  transform: skewX(-8deg);
}
#lower-third span {
  color: #fff;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.5px;
  transform: skewX(8deg);
}

/* Ticker bar */
#ticker {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 40px;
  background: #c4161c;
  display: flex;
  align-items: center;
  overflow: hidden;
}
#ticker span {
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  white-space: nowrap;
  padding-left: 100%;
}
</style>
</head>
<body>

<div data-composition-id="news-overview-30s" data-width="1280" data-height="720" data-start="0">

  <!-- B-Roll Clip 0: Establishing — 0.0s to 5.0s -->
  <video id="clip-0" class="clip-video" src="clip_00_establishing.mp4"
    data-start="0" data-duration="5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 1: Signage — 5.0s to 7.5s -->
  <video id="clip-1" class="clip-video" src="clip_01_signage.mp4"
    data-start="5" data-duration="2.5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 2: Crowd — 7.5s to 12.5s -->
  <video id="clip-2" class="clip-video" src="clip_02_crowd_flags.mp4"
    data-start="7.5" data-duration="5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 3: Interview A — 12.5s to 17.5s -->
  <video id="clip-3" class="clip-video" src="clip_03_interview_a.mp4"
    data-start="12.5" data-duration="5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 4: Interview B — 17.5s to 22.5s -->
  <video id="clip-4" class="clip-video" src="clip_04_interview_b.mp4"
    data-start="17.5" data-duration="5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 5: Daylight crowd — 22.5s to 26.0s -->
  <video id="clip-5" class="clip-video" src="clip_05_crowd_day.mp4"
    data-start="22.5" data-duration="3.5" data-track-index="0" muted playsinline></video>

  <!-- B-Roll Clip 6: Night wide — 26.0s to 31.0s -->
  <video id="clip-6" class="clip-video" src="clip_06_wide_night.mp4"
    data-start="26" data-duration="5" data-track-index="0" muted playsinline></video>

  <!-- VO narration (audio lane) -->
  <audio id="vo" src="vo.wav"
    data-start="0" data-duration="18.7" data-track-index="1"></audio>

  <!-- Lower third headline overlay -->
  <div id="lower-third" class="clip" data-start="2" data-duration="8">
    <span>HEADLINE TEXT — Location Details</span>
  </div>

  <!-- Scrolling news ticker -->
  <div id="ticker" class="clip" data-start="0" data-duration="31">
    <span>+++ TICKER TEXT ONE +++ TICKER TEXT TWO +++ TICKER TEXT THREE +++</span>
  </div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
window.__timelines = window.__timelines || {};
const tl = gsap.timeline({ paused: true });

// Crossfade duration between clips
const XF = 0.4;

// Clip 0 entrance
tl.from("#clip-0", { opacity: 0, duration: XF, ease: "power2.out" }, 0);

// Clip 1 entrance — crossfade over clip 0 tail
tl.from("#clip-1", { opacity: 0, duration: XF, ease: "power2.out" }, 4.8);
tl.to("#clip-0", { opacity: 0, duration: XF, ease: "power2.in" }, 4.8);

// Clip 2 entrance
tl.from("#clip-2", { opacity: 0, duration: XF, ease: "power2.out" }, 7.3);
tl.to("#clip-1", { opacity: 0, duration: XF, ease: "power2.in" }, 7.3);

// Clip 3 entrance
tl.from("#clip-3", { opacity: 0, duration: XF, ease: "power2.out" }, 12.3);
tl.to("#clip-2", { opacity: 0, duration: XF, ease: "power2.in" }, 12.3);

// Clip 4 entrance
tl.from("#clip-4", { opacity: 0, duration: XF, ease: "power2.out" }, 17.3);
tl.to("#clip-3", { opacity: 0, duration: XF, ease: "power2.in" }, 17.3);

// Clip 5 entrance
tl.from("#clip-5", { opacity: 0, duration: XF, ease: "power2.out" }, 22.3);
tl.to("#clip-4", { opacity: 0, duration: XF, ease: "power2.in" }, 22.3);

// Clip 6 entrance
tl.from("#clip-6", { opacity: 0, duration: XF, ease: "power2.out" }, 25.8);
tl.to("#clip-5", { opacity: 0, duration: XF, ease: "power2.in" }, 25.8);

// Final fade to black (last scene only)
tl.to("#clip-6", { opacity: 0, duration: 0.5, ease: "power2.in" }, 30.5);

// Lower third slide in from left
tl.from("#lower-third", { x: -200, opacity: 0, duration: 0.5, ease: "expo.out" }, 2);
// Lower third slide out
tl.to("#lower-third", { x: -200, opacity: 0, duration: 0.4, ease: "power2.in" }, 9.6);

// Ticker fade in
tl.from("#ticker", { opacity: 0, duration: 0.3, ease: "power2.out" }, 0);
// Ticker text scroll
tl.to("#ticker span", { xPercent: -100, duration: 25, ease: "none" }, 0);

window.__timelines["news-overview-30s"] = tl;
</script>
</div>
</body>
</html>
