<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080,height=1920">
<title>Social Clip 9:16 — FFWD Video Kitchen</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; overflow: hidden; width: 1080px; height: 1920px; font-family: 'Inter', sans-serif; }
  .scene { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; opacity: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 60px; }
  .hook-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #e50914; }
</style>
</head>
<body>

<!-- Scene 1: Hook Flash (0-1.5s) -->
<div class="scene" id="scene-hook">
  <div id="hook-flash" class="hook-flash" style="opacity:0;"></div>
  <div id="hook-text" class="text-7xl font-black text-white text-center" style="opacity:0; position:relative; z-index:1;">
    WAIT<br>FOR IT<span style="color:#e50914;">.</span>
  </div>
</div>

<!-- Scene 2: Quick Cut 1 (1.5-5s) -->
<div class="scene" id="scene-cut1" style="background: linear-gradient(180deg, #1a1a1a, #0a0a0a);">
  <div id="cut1-emoji" style="font-size:120px; opacity:0;">🔥</div>
  <h2 id="cut1-text" class="text-5xl font-black text-white text-center mt-8" style="opacity:0;">
    This Changed<br>EVERYTHING
  </h2>
</div>

<!-- Scene 3: Quick Cut 2 (5-9s) -->
<div class="scene" id="scene-cut2" style="background: linear-gradient(180deg, #1a0a0a, #0a0a0a);">
  <div id="cut2-block" style="opacity:0;">
    <div style="width:400px; height:400px; border:4px solid #e50914; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto;">
      <span class="text-8xl font-black text-white">NO</span>
    </div>
    <p class="text-3xl font-bold text-gray-300 text-center mt-8">Way.</p>
  </div>
</div>

<!-- Scene 4: Quick Cut 3 (9-13s) -->
<div class="scene" id="scene-cut3" style="background: linear-gradient(180deg, #0a0a1a, #0a0a0a);">
  <div id="cut3-stack" style="opacity:0;">
    <div class="text-3xl font-bold text-gray-500 mb-4">POV:</div>
    <div class="text-6xl font-black text-white">You just found out</div>
    <div class="text-7xl font-black mt-4" style="color:#e50914;">THE TRUTH</div>
  </div>
</div>

<!-- Scene 5: Punchline (13-20s) -->
<div class="scene" id="scene-punch" style="background: #0a0a0a;">
  <div id="punch-content" style="text-align:center; opacity:0;">
    <div class="text-2xl font-bold text-gray-500 tracking-widest mb-6">FFWD</div>
    <div class="text-8xl font-black text-white">😂</div>
    <div class="text-5xl font-black mt-6" style="color:#e50914;">FOLLOW</div>
    <div class="text-3xl font-bold text-gray-400 mt-2">for more</div>
  </div>
  <div id="punch-line" style="position:absolute; bottom:200px; width:0; height:4px; background:#e50914;"></div>
</div>

<script>
(function() {
  const tl = gsap.timeline({ paused: true });

  // Scene 1: Hook (0-1.5s) — fast flash
  tl.fromTo('#scene-hook', { opacity: 0 }, { opacity: 1, duration: 0.1 }, 0)
    .fromTo('#hook-flash', { opacity: 1 }, { opacity: 0, duration: 0.3, ease: 'power2.out' }, 0.1)
    .fromTo('#hook-text', { scale: 1.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(3)' }, 0.15)
    .to('#scene-hook', { opacity: 0, duration: 0.15 }, 1.35);

  // Scene 2: Cut 1 (1.5-5s) — fast zoom in
  tl.fromTo('#scene-cut1', { opacity: 0, scale: 1.3 }, { opacity: 1, scale: 1, duration: 0.25, ease: 'power2.out' }, 1.5)
    .fromTo('#cut1-emoji', { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.4, ease: 'back.out(4)' }, 1.7)
    .fromTo('#cut1-text', { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.35, ease: 'power3.out' }, 2.1)
    .to('#scene-cut1', { opacity: 0, scale: 0.9, duration: 0.15 }, 4.85);

  // Scene 3: Cut 2 (5-9s) — surprise reveal
  tl.fromTo('#scene-cut2', { opacity: 0, rotation: 5 }, { opacity: 1, rotation: 0, duration: 0.2 }, 5.0)
    .fromTo('#cut2-block', { scale: 0.3, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: 'back.out(2)' }, 5.2)
    .to('#scene-cut2', { opacity: 0, duration: 0.15 }, 8.85);

  // Scene 4: Cut 3 (9-13s) — text stack
  tl.fromTo('#scene-cut3', { opacity: 0 }, { opacity: 1, duration: 0.15 }, 9.0)
    .fromTo('#cut3-stack', { y: 60, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, ease: 'power3.out' }, 9.15)
    .to('#scene-cut3', { opacity: 0, duration: 0.15 }, 12.85);

  // Scene 5: Punchline (13-20s)
  tl.fromTo('#scene-punch', { opacity: 0 }, { opacity: 1, duration: 0.2 }, 13.0)
    .fromTo('#punch-content', { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.6, ease: 'back.out(2)' }, 13.2)
    .to('#punch-line', { width: 300, duration: 0.5, ease: 'power2.out' }, 14.5);

  window.__timelines = [tl];
  window.__duration = 20;

  window.addEventListener('hf-seek', function(e) {
    var t = (e && e.detail && e.detail.time != null) ? e.detail.time : 0;
    tl.time(t);
    tl.pause();
  });
})();
</script>
</body>
</html>
