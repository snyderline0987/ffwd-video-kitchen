# Video Kitchen + Agent0
# Open-source autonomous agent framework

services:
  video-kitchen-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: vk-dashboard
    restart: unless-stopped
    environment:
      - VK_WORKSPACE=/workspace
    volumes:
      - vk-workspace:/workspace
      - ${RAW_FOOTAGE_PATH:-./raw_footage}:/workspace/raw_footage:ro
    ports:
      - "8080:8080"
      - "3002:3002"

  agent0:
    image: ghcr.io/agent0hq/agent0:latest
    container_name: vk-agent0
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AGENT0_WORKSPACE=/workspace
      - AGENT0_SKILLS_DIR=/skills
    volumes:
      - vk-workspace:/workspace
      - ./skills:/skills:ro
      - ./AGENTS.md:/workspace/AGENTS.md:ro
    depends_on:
      - video-kitchen-dashboard

volumes:
  vk-workspace:
