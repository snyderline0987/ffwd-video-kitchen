version: "3.8"

services:
  video-kitchen:
    build: .
    container_name: video-kitchen
    restart: unless-stopped
    environment:
      # API Keys (pass via .env file)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Chat integration (optional)
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # Remote access (optional)
      - TS_AUTHKEY=${TS_AUTHKEY:-}
    volumes:
      # Persist workspace (projects, output, memory)
      - vk-workspace:/workspace
      # Mount raw footage from host (NAS, SSD, etc.)
      - ${RAW_FOOTAGE_PATH:-./raw_footage}:/workspace/raw_footage:ro
    ports:
      - "3000:3000"   # OpenClaw agent chat
      - "8080:8080"   # Recipe dashboard
      - "3002:3002"   # Hyperframes preview
    # Override command for development (skip build, mount skills live)
    # command: ["openclaw", "start"]

  # Development mode: run OpenClaw image directly with mounted skills
  # Uncomment below and comment out `video-kitchen` above to use
  # video-kitchen-dev:
  #   image: openclaw/openclaw:latest
  #   container_name: video-kitchen-dev
  #   volumes:
  #     - ./skills/video-kitchen:/usr/local/lib/node_modules/openclaw/skills/video-kitchen
  #     - ./skills/video-kitchen-recipe-creator:/usr/local/lib/node_modules/openclaw/skills/video-kitchen-recipe-creator
  #     - ./skills/film-editing-theory:/usr/local/lib/node_modules/openclaw/skills/film-editing-theory
  #     - ./skills/hyperframes:/usr/local/lib/node_modules/openclaw/skills/hyperframes
  #     - ./skills/open-design:/usr/local/lib/node_modules/openclaw/skills/open-design
  #     - ./workspace:/workspace
  #     - ./skills/video-kitchen/recipes:/app/recipes
  #   ports:
  #     - "3000:3000"
  #     - "8080:8080"
  #     - "3002:3002"
  #   environment:
  #     - GEMINI_API_KEY=${GEMINI_API_KEY:-}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #   command: ["sh", "-c", "cd /app/recipes && node server.js & cd /workspace && openclaw start"]

volumes:
  vk-workspace:
